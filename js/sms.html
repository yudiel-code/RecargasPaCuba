<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SMS Test - RecargasPaCuba</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#0ea5c6; margin:0; }
    .wrap { max-width: 520px; margin: 40px auto; padding: 20px; }
    .card { background: rgba(255,255,255,0.92); border-radius: 16px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.18); }
    h1 { margin: 0 0 12px; font-size: 20px; }
    .row { display:flex; gap:10px; margin: 10px 0; }
    input { flex:1; padding: 12px 12px; border-radius: 12px; border: 1px solid #d9d9d9; font-size: 16px; }
    button { padding: 12px 12px; border-radius: 12px; border: 0; background:#0b5bd3; color:#fff; font-weight:700; cursor:pointer; }
    button:disabled { opacity: .6; cursor:not-allowed; }
    .muted { color:#4b5563; font-size: 13px; margin-top: 8px; }
    .ok { color:#0a7a2f; font-weight:700; }
    .err { color:#b91c1c; font-weight:700; }
    #recaptcha-container { margin-top: 10px; }
    code { background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Prueba Phone Auth (SMS)</h1>

      <div class="row">
        <input id="phone" placeholder="+34..." autocomplete="tel" />
        <button id="send">Enviar SMS</button>
      </div>

      <div class="row">
        <input id="code" placeholder="Código (6 dígitos)" inputmode="numeric" autocomplete="one-time-code" />
        <button id="confirm" disabled>Confirmar</button>
      </div>

      <div id="recaptcha-container"></div>

      <div id="status" class="muted">Estado: <code>idle</code></div>
      <div class="muted">
        Nota: esta página es solo para el preview <code>sms-tests</code>. No toca tu login actual.
      </div>
    </div>
  </div>

  <!-- Carga tu módulo de Firebase (el que ya expone window.firebaseAuth, etc.) -->
  <script type="module" src="./firebase.js"></script>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const phoneEl = $("phone");
      const codeEl = $("code");
      const sendBtn = $("send");
      const confirmBtn = $("confirm");
      const statusEl = $("status");

      function setStatus(text, kind) {
        statusEl.innerHTML = 'Estado: <code>' + text + '</code>';
        statusEl.className = "muted" + (kind ? " " + kind : "");
      }

      function assertReady() {
        if (!window.firebaseAuth) throw new Error("firebaseAuth-no-disponible");
        if (!window.firebaseSignInWithPhoneNumber) throw new Error("signInWithPhoneNumber-no-disponible");
        if (!window.firebaseRecaptchaVerifier) throw new Error("RecaptchaVerifier-no-disponible");
      }

      let verifier = null;
      let confirmationResult = null;

      async function ensureVerifier() {
        if (verifier) return verifier;

        // IMPORTANTE: usamos reCAPTCHA *visible* (default) para que sea estable en pruebas
        verifier = new window.firebaseRecaptchaVerifier(
          window.firebaseAuth,
          "recaptcha-container",
          {
            size: "normal",
            callback: () => {},
            "expired-callback": () => {}
          }
        );

        await verifier.render();
        return verifier;
      }

      sendBtn.addEventListener("click", async () => {
        try {
          assertReady();
          setStatus("preparando-recaptcha");
          sendBtn.disabled = true;

          const phone = String(phoneEl.value || "").trim();
          if (!phone.startsWith("+")) throw new Error("telefono-debe-ser-E164-ej-+34...");
          await ensureVerifier();

          setStatus("enviando-sms");
          confirmationResult = await window.firebaseSignInWithPhoneNumber(window.firebaseAuth, phone, verifier);

          setStatus("sms-enviado", "ok");
          confirmBtn.disabled = false;
          codeEl.focus();
        } catch (e) {
          console.error(e);
          setStatus("error: " + (e?.code || e?.message || "desconocido"), "err");
          // Si falló, permite reintentar sin quedarse bloqueado
          sendBtn.disabled = false;
        }
      });

      confirmBtn.addEventListener("click", async () => {
        try {
          if (!confirmationResult) throw new Error("no-hay-confirmationResult");
          const code = String(codeEl.value || "").trim();
          if (code.length < 4) throw new Error("codigo-invalido");
          confirmBtn.disabled = true;

          setStatus("confirmando-codigo");
          const cred = await confirmationResult.confirm(code);

          setStatus("login-ok uid=" + cred.user.uid, "ok");
          // No redirigimos a recargar: evitamos el loop. Solo confirmamos login.
        } catch (e) {
          console.error(e);
          setStatus("error: " + (e?.code || e?.message || "desconocido"), "err");
          confirmBtn.disabled = false;
        }
      });

      setStatus("listo");
    })();
  </script>
</body>
</html>
