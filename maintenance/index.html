<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c1425">
  <meta name="robots" content="noindex, nofollow">
  <title>RecargasPaCuba | Mantenimiento</title>
  <style>
    :root{
      --bg:#0c1425;
      --card:#121d33;
      --line:rgba(255,255,255,.08);
      --text:#f5f7fb;
      --muted:#a8b3c7;
      --accent:#3b82f6;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top, rgba(59,130,246,.18), transparent 35%),
        linear-gradient(180deg, #0c1425 0%, #0a1120 100%);
      color:var(--text);
    }
    .card{
      width:min(100%, 560px);
      background:rgba(18,29,51,.92);
      border:1px solid var(--line);
      border-radius:24px;
      padding:32px 24px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(59,130,246,.12);
      border:1px solid rgba(59,130,246,.22);
      color:#cfe1ff;
      font-size:12px;
      font-weight:700;
      letter-spacing:.3px;
      margin-bottom:18px;
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(28px,5vw,40px);
      line-height:1.1;
    }
    p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.6;
    }
    .box{
      margin-top:22px;
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }
    .btn{
      display:inline-block;
      margin-top:22px;
      padding:14px 18px;
      border-radius:14px;
      background:var(--accent);
      color:#fff;
      text-decoration:none;
      font-weight:700;
    }
    .foot{
      margin-top:18px;
      font-size:13px;
      color:#7f8ba3;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">MANTENIMIENTO TEMPORAL</div>
    <h1>Estamos haciendo mejoras</h1>
    <p>
      RecargasPaCuba no está disponible en este momento mientras realizamos ajustes
      para volver con un servicio más estable.
    </p>

    <div class="box">
      Gracias por tu paciencia. Inténtalo de nuevo más tarde.
    </div>

    <a class="btn" href="mailto:recargaspacubaapp@gmail.com">Contactar soporte</a>

    <div class="foot">© <span id="y"></span> RecargasPaCuba</div>
  </main>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
