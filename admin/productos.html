<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos | RecargasPaCuba</title>

  <link rel="stylesheet" href="../styles/base.css?v=r2">
  <link rel="stylesheet" href="../styles/app.css?v=r2">
  <link rel="stylesheet" href="admin.css?v=r2">

  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#28c6db">
</head>

<body>

<header class="site-header">
  <span class="brand">Panel de administración · RecargasPaCuba</span>
</header>

<div class="layout">
  <div class="layout-inner">

    <aside class="sidebar">
      <div class="sidebar-title">Navegación</div>
      <a href="dashboard.html">
        <span class="icon">🏠</span><span>Inicio</span>
      </a>
      <a href="stats.html">
        <span class="icon">📊</span><span>Estadísticas</span>
      </a>
      <a href="ventas.html">
        <span class="icon">🛒</span><span>Ventas</span>
      </a>
      <a href="ganancias.html">
        <span class="icon">💸</span><span>Ganancias</span>
      </a>
      <a href="productos.html" class="active">
        <span class="icon">📦</span><span>Productos</span>
      </a>

      <button id="logout" class="logout-btn">Cerrar sesión</button>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h3>Gestión de productos</h3>
          <div class="topbar-sub">Lista de recargas y servicios que ofreces en la app.</div>
        </div>
        <div class="badge-ambiente">Entorno interno</div>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
          <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Precio</th>
            <th>Visible</th>
          </tr>
          </thead>
          <tbody>
          <tr>
            <td colspan="4" class="table-empty">Sin productos aún</td>
          </tr>
          </tbody>
        </table>
      </div>
    </main>

  </div>
</div>

<!-- Firebase + protección admin -->
<script type="module" src="../js/firebase.js?v=r1"></script>
<script src="admin.js?v=r1" defer></script>

<script>
  window.history.scrollRestoration = "manual";
  window.onload = () => window.scrollTo(0, 0);
</script>

</body>
</html>
