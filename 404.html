<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Página no encontrada | RecargasPaCuba</title>
    <link rel="stylesheet" href="styles/base.css?v=r2">
    <style>
body{display:flex;align-items:center;justify-content:center;padding:24px 16px;}
.error-card{width:min(520px,100%);padding:28px 24px;border-radius:32px;background:rgba(255,255,255,0.94);border:1px solid rgba(15,23,42,0.08);box-shadow:var(--shadow-xl);text-align:left;}
.error-code{display:inline-flex;padding:7px 12px;border-radius:999px;background:rgba(15,91,215,0.08);color:var(--brand-primary);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;}
.error-title{margin-top:14px;font-family:var(--font-display);font-size:clamp(1.9rem,7vw,2.6rem);line-height:1.02;letter-spacing:-.04em;}
.error-desc{margin-top:12px;color:var(--text-secondary);font-size:14px;line-height:1.65;}
.error-link{display:inline-flex;align-items:center;justify-content:center;min-height:48px;margin-top:18px;padding:0 18px;border-radius:16px;background:linear-gradient(135deg,var(--brand-primary),#2b78ec);color:#fff;font-weight:800;box-shadow:0 16px 28px rgba(15,91,215,.22)}
  </style>
  </head>
  <body class="page-legal">
    <div class="error-card">
      <div class="error-code">404</div>
      <h1 class="error-title">Página no encontrada</h1>
      <p class="error-desc">Lo sentimos, la página que buscas no existe o ha sido movida. Verifica la URL e inténtalo de nuevo.</p>
      <a href="index.html" class="error-link">Volver al inicio</a>
    </div>
  </body>
</html>
